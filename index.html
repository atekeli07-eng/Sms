<!DOCTYPE html>
<html>
<head>
    <title>Chat App - Canlı Durum & Medya</title>
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 200px; border-right: 1px solid #ccc; padding: 10px; background: #f9f9f9; }
        #chat-area { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; background: #ece5dd; }
        #input-area { padding: 15px; border-top: 1px solid #ccc; display: flex; gap: 10px; }
        
        /* Işık göstergeleri */
        .user-item { margin-bottom: 10px; display: flex; align-items: center; }
        .dot { height: 10px; width: 10px; border-radius: 50%; margin-right: 10px; }
        .online { background-color: #2ecc71; box-shadow: 0 0 5px #2ecc71; }
        .offline { background-color: #e74c3c; }
        
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 8px; max-width: 70%; background: white; }
        .msg b { display: block; font-size: 0.8em; color: #555; }
        .chat-img { max-width: 200px; border-radius: 5px; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Kullanıcılar</h3>
    <div id="userList"></div>
</div>

<div id="chat-area">
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="msgInput" placeholder="Mesaj yaz..." style="flex:1">
        <button onclick="sendMedia()">📷 Foto At</button>
        <button onclick="sendMsg()" style="background: #25d366; color: white; border: none; padding: 10px 20px; border-radius: 5px;">Gönder</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const username = prompt("Kullanıcı adınız?") || "Anonim";
    
    socket.emit('join', username);

    // Kullanıcı listesini güncelle (Işıklar burada yanıyor)
    socket.on('userList', (users) => {
        const list = document.getElementById('userList');
        list.innerHTML = '';
        for (let name in users) {
            const statusClass = users[name].status === 'online' ? 'online' : 'offline';
            list.innerHTML += `<div class="user-item">
                <span class="dot ${statusClass}"></span> ${name}
            </div>`;
        }
    });

    // Mesaj geldiğinde ekrana bas
    socket.on('chatMessage', (data) => {
        const div = document.createElement('div');
        div.className = 'msg';
        let content = data.text;
        
        if(data.type === 'image') {
            content = `<img src="${data.text}" class="chat-img">`;
        }

        div.innerHTML = `<b>${data.user}</b> ${content}`;
        document.getElementById('messages').appendChild(div);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    });

    function sendMsg() {
        const input = document.getElementById('msgInput');
        if(input.value) {
            socket.emit('sendMessage', { text: input.value, type: 'text' });
            input.value = '';
        }
    }

    // Medya simülasyonu (Gerçek bir yükleme için Cloudinary/S3 gerekir)
    function sendMedia() {
        const dummyImageUrl = "https://picsum.photos/200/150?random=" + Math.random();
        socket.emit('sendMessage', { text: dummyImageUrl, type: 'image' });
    }
</script>
</body>
</html>
